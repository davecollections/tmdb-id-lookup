name: Daily Capped Repair Cache From Audit

on:
  workflow_dispatch:

  workflow_run:
    workflows:
      - Audit TMDB Export Coverage
    types:
      - completed

concurrency:
  group: daily-capped-repair-cache-from-audit
  cancel-in-progress: false

jobs:
  repair:
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest
    timeout-minutes: 90

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Repair company cache from audit
        env:
          TMDB_BEARER_TOKEN: ${{ secrets.TMDB_BEARER_TOKEN }}
          REQUEST_DELAY_MS: 120
          MAX_REPAIR_IDS: 200
        run: node scripts/repair-company-cache-from-audit.mjs

      - name: Repair TV network cache from audit
        env:
          TMDB_BEARER_TOKEN: ${{ secrets.TMDB_BEARER_TOKEN }}
          REQUEST_DELAY_MS: 120
          MAX_REPAIR_IDS: 200
        run: node scripts/repair-tv-network-cache-from-audit.mjs

      - name: Commit repaired caches
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add \
            data/companies.min.json \
            data/companies.csv \
            data/company-cache-repair-meta.json \
            data/tv-networks.min.json \
            data/tv-networks.csv \
            data/tv-network-cache-repair-meta.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Daily capped repair TMDB caches from audit"

          git pull --rebase origin main

          git push
