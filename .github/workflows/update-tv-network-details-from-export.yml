name: Update TMDB TV Network Details From Export

on:
  workflow_dispatch:

concurrency:
  group: tmdb-tv-network-details-cache
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch TMDB TV network details from daily export
        env:
          TMDB_BEARER_TOKEN: ${{ secrets.TMDB_BEARER_TOKEN }}
          REQUEST_DELAY_MS: 120
        run: node scripts/fetch-tv-network-details-from-export.mjs

      - name: Commit updated TV network detail data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/tv-networks.min.json data/tv-networks.csv data/tv-network-scan-meta.json data/tv-network-export.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update TMDB TV network details from export"

          git pull --rebase origin main

          git push
