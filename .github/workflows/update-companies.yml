name: Update TMDB Companies

on:
  workflow_dispatch:
    inputs:
      start_id:
        description: "Start TMDB company ID"
        required: true
        default: "1"
      end_id:
        description: "End TMDB company ID"
        required: true
        default: "500"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch TMDB companies
        run: node scripts/fetch-companies.mjs
        env:
          TMDB_BEARER_TOKEN: ${{ secrets.TMDB_BEARER_TOKEN }}
          START_ID: ${{ github.event.inputs.start_id }}
          END_ID: ${{ github.event.inputs.end_id }}

      - name: Commit updated company data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/companies.json data/companies.csv data/scan-meta.json
          git commit -m "Update TMDB company lookup" || echo "No changes"
          git push
