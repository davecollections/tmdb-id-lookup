name: Update TMDB Companies

on:
  workflow_dispatch:
    inputs:
      start_id:
        description: "Start TMDB company ID"
        required: true
        default: "1"

      end_id:
        description: "End TMDB company ID"
        required: true
        default: "500"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch TMDB companies
        env:
          TMDB_BEARER_TOKEN: ${{ secrets.TMDB_BEARER_TOKEN }}
          START_ID: ${{ github.event.inputs.start_id }}
          END_ID: ${{ github.event.inputs.end_id }}
        run: node scripts/fetch-companies.mjs

      - name: Commit updated company data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/companies.json data/companies.min.json data/companies.csv data/scan-meta.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update TMDB company lookup"

          git pull --rebase origin main

          git push
