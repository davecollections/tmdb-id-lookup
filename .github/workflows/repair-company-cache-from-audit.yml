name: Repair Company Cache From Audit

on:
  workflow_dispatch:

concurrency:
  group: repair-company-cache
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Repair company cache from audit
        env:
          TMDB_BEARER_TOKEN: ${{ secrets.TMDB_BEARER_TOKEN }}
          REQUEST_DELAY_MS: 120
        run: node scripts/repair-company-cache-from-audit.mjs

      - name: Commit repaired company cache
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/companies.min.json data/companies.csv data/company-cache-repair-meta.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Repair TMDB company cache from audit"

          git pull --rebase origin main

          git push
