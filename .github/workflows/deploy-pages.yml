name: Deploy GitHub Pages

on:
  workflow_dispatch:

  push:
    branches:
      - main

  workflow_run:
    workflows:
      - Update TMDB Genre Counts
      - Monthly TMDB Company Refresh
      - Monthly TMDB Network Refresh
      - Manual Company Rebuild From Export
      - Update TMDB TV Network Details From Export
      - Repair Cache From Audit
      - Daily Capped Repair Cache From Audit
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Generate asset version
        run: echo "APP_ASSET_VERSION=$(date +%Y%m%d%H%M%S)-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Inject frontend config
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          sed -i "s|__TMDB_API_KEY__|${TMDB_API_KEY}|g" js/config.js
          sed -i "s|__APP_ASSET_VERSION__|${APP_ASSET_VERSION}|g" js/config.js
          sed -i "s|__APP_ASSET_VERSION__|${APP_ASSET_VERSION}|g" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
