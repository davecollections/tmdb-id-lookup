name: Update TMDB Companies From Export

on:
  workflow_dispatch:
    inputs:
      offset:
        description: "Starting export offset"
        required: true
        default: "0"

      limit:
        description: "Number of export IDs to process"
        required: true
        default: "1000"

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Fetch TMDB companies from daily export
        env:
          TMDB_BEARER_TOKEN: ${{ secrets.TMDB_BEARER_TOKEN }}
        run: |
          node scripts/fetch-companies-from-export.mjs \
            ${{ github.event.inputs.offset }} \
            ${{ github.event.inputs.limit }}

      - name: Commit updated company data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update TMDB company lookup from export"

          git pull --rebase origin main

          git push
