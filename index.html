<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TMDB Company Lookup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Inter, system-ui, sans-serif;
      background: #0b0d10;
      color: #f5f5f5;
      margin: 0;
      padding: 32px;
    }

    input,
    select {
      width: 100%;
      max-width: 520px;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #151922;
      color: white;
      font-size: 16px;
      box-sizing: border-box;
    }

    select {
      width: auto;
      min-width: 110px;
      padding: 10px 12px;
      font-size: 14px;
    }

    button {
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #151922;
      color: #8ab4ff;
      font-size: 16px;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover:not(:disabled) {
      border-color: #8ab4ff;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border: 1px solid #1c222c;
      border-radius: 12px;
      background: #0f1218;
    }

    table {
      width: 100%;
      min-width: 920px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 12px;
      border-bottom: 1px solid #222;
      text-align: left;
      vertical-align: middle;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #111720;
      z-index: 2;
    }

    tbody tr:last-child td {
      border-bottom: 0;
    }

    tbody tr:hover {
      background: #111720;
    }

    th.sortable {
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    th.sortable:hover {
      color: #8ab4ff;
    }

    .sort-indicator {
      opacity: 0.65;
      margin-left: 4px;
      font-size: 12px;
    }

    a {
      color: #8ab4ff;
    }

    .meta {
      color: #aeb7c2;
      font-size: 14px;
      margin: 6px 0;
    }

    .download-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin: 14px 0 18px;
      font-size: 14px;
    }

    .download-links span {
      color: #566171;
    }

    .download-links a {
      background: #151922;
      border: 1px solid #2b313b;
      border-radius: 8px;
      color: #8ab4ff;
      padding: 8px 11px;
      text-decoration: none;
    }

    .download-links a:hover {
      border-color: #8ab4ff;
    }

    .search-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }

    #result-count {
      color: #aeb7c2;
      font-size: 14px;
      margin: 0;
    }

    .controls-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin: 0 0 18px;
    }

    .pagination {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .pagination button {
      padding: 9px 12px;
      font-size: 14px;
      border-radius: 8px;
    }

    .page-status,
    .rows-control {
      color: #aeb7c2;
      font-size: 14px;
    }

    .rows-control {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pagination-bottom {
      margin-top: 16px;
      justify-content: flex-end;
    }

    .mobile-scroll-hint {
      display: none;
      color: #7f8a99;
      font-size: 13px;
      margin: -6px 0 12px;
    }

    .movie-count-note {
      color: #7f8a99;
      font-size: 12px;
      font-weight: normal;
      display: block;
      margin-top: 3px;
      line-height: 1.25;
      max-width: 160px;
    }

    .logo-cell {
      width: 76px;
    }

    .logo-box {
      width: 64px;
      height: 30px;
      background: #f2f4f7;
      border: 1px solid #d8dde6;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      box-sizing: border-box;
    }

    .studio-logo {
      max-height: 22px;
      max-width: 56px;
      object-fit: contain;
      display: block;
    }

    .logo-placeholder {
      width: 64px;
      height: 30px;
      background: #1b1f27;
      border: 1px solid #2b313b;
      border-radius: 6px;
      box-sizing: border-box;
    }

    #back-to-top {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      padding: 10px 13px;
      border-radius: 999px;
      background: #151922;
      border: 1px solid #2b313b;
      color: #8ab4ff;
      font-size: 14px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }

    #back-to-top:hover {
      border-color: #8ab4ff;
    }

    @media (max-width: 720px) {
      body {
        padding: 18px;
      }

      h1 {
        font-size: 26px;
        margin-bottom: 10px;
      }

      .search-row {
        flex-direction: column;
        align-items: stretch;
      }

      input {
        max-width: none;
      }

      button {
        width: 100%;
      }

      #back-to-top {
        width: auto;
        right: 14px;
        bottom: 14px;
      }

      .download-links {
        gap: 8px;
      }

      .download-links a {
        flex: 1;
        text-align: center;
      }

      .download-links span {
        display: none;
      }

      .controls-row {
        align-items: stretch;
        flex-direction: column;
      }

      .pagination {
        width: 100%;
      }

      .pagination button {
        flex: 1;
      }

      .rows-control {
        justify-content: space-between;
      }

      .rows-control select {
        flex: 1;
      }

      .mobile-scroll-hint {
        display: block;
      }

      .table-wrap {
        border-radius: 10px;
      }

      table {
        min-width: 840px;
      }

      th,
      td {
        padding: 10px;
        font-size: 14px;
      }

      .movie-count-note {
        font-size: 11px;
        max-width: 130px;
      }

      .logo-cell {
        width: 68px;
      }

      .logo-box,
      .logo-placeholder {
        width: 58px;
        height: 28px;
      }

      .studio-logo {
        max-width: 50px;
        max-height: 20px;
      }
    }
  </style>
</head>

<body>
  <h1>TMDB Company Lookup</h1>

  <p>Search cached TMDB company IDs.</p>
  <p id="stats" class="meta"></p>
  <p id="last-updated" class="meta"></p>
  <p id="scan-stats" class="meta"></p>

  <div class="download-links">
    <a href="./data/companies.json" download>Download JSON</a>
    <span>·</span>
    <a href="./data/companies.csv" download>Download CSV</a>
  </div>

  <div class="search-row">
    <input id="search" placeholder="Search by ID, company name, country, or headquarters…">
    <button id="clear-search" type="button">Clear</button>
  </div>

  <div class="controls-row">
    <p id="result-count"></p>

    <div class="rows-control">
      <label for="rows-per-page">Rows per page</label>
      <select id="rows-per-page">
        <option value="100">100</option>
        <option value="250" selected>250</option>
        <option value="500">500</option>
        <option value="all">All</option>
      </select>
    </div>

    <div class="pagination">
      <button id="first-page" type="button">First</button>
      <button id="prev-page" type="button">Previous</button>
      <span id="page-status" class="page-status"></span>
      <button id="next-page" type="button">Next</button>
      <button id="last-page" type="button">Last</button>
    </div>
  </div>

  <p class="mobile-scroll-hint">Swipe sideways to view all columns.</p>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Logo</th>
          <th class="sortable" data-sort="id">ID <span class="sort-indicator"></span></th>
          <th class="sortable" data-sort="name">Company <span class="sort-indicator"></span></th>
          <th class="sortable" data-sort="titles_count">
            Movie Count <span class="sort-indicator"></span>
            <span class="movie-count-note">Uses TMDB discover/movie results.</span>
          </th>
          <th class="sortable" data-sort="origin_country">Country <span class="sort-indicator"></span></th>
          <th class="sortable" data-sort="headquarters">Headquarters <span class="sort-indicator"></span></th>
          <th>TMDB</th>
        </tr>
      </thead>

      <tbody id="results"></tbody>
    </table>
  </div>

  <div class="pagination pagination-bottom">
    <button id="first-page-bottom" type="button">First</button>
    <button id="prev-page-bottom" type="button">Previous</button>
    <span id="page-status-bottom" class="page-status"></span>
    <button id="next-page-bottom" type="button">Next</button>
    <button id="last-page-bottom" type="button">Last</button>
  </div>

  <button id="back-to-top" type="button" aria-label="Back to top">↑ Top</button>

  <script>
    let companies = [];
    let filteredCompanies = [];
    let currentSearch = "";
    let sortKey = "id";
    let sortDirection = "asc";
    let currentPage = 1;
    let rowsPerPage = 250;

    async function loadCompanies() {
      const companiesRes = await fetch("./data/companies.json");
      companies = await companiesRes.json();

      document.getElementById("stats").innerText =
        `${companies.length.toLocaleString()} companies cached`;

      try {
        const metaRes = await fetch("./data/scan-meta.json");

        if (metaRes.ok) {
          const meta = await metaRes.json();
          const lastScan = meta.last_scan;
          const updated = new Date(lastScan.finished_at);

          document.getElementById("last-updated").innerText =
            `Last updated ${updated.toLocaleString()}`;

          if (lastScan.mode === "tmdb_daily_export") {
            const nextOffset = Number(lastScan.offset || 0) + Number(lastScan.limit || 0);

            document.getElementById("scan-stats").innerText =
              `Last scan: export offset ${Number(lastScan.offset || 0).toLocaleString()} → ${(nextOffset - 1).toLocaleString()} | Processed ${lastScan.checked.toLocaleString()} | Next offset: ${nextOffset.toLocaleString()} of ${lastScan.export_total_ids.toLocaleString()}`;
          } else {
            document.getElementById("scan-stats").innerText =
              `Last scan: IDs ${lastScan.start_id.toLocaleString()} → ${lastScan.end_id.toLocaleString()} | Checked ${lastScan.checked.toLocaleString()} | Valid ${lastScan.found.toLocaleString()} | IDs with no record: ${lastScan.missing.toLocaleString()}`;
          }
        }
      } catch (error) {
        console.warn("scan-meta.json not available yet");
      }

      applyFiltersAndSort();
    }

    function getSortValue(company, key) {
      const value = company[key];

      if (key === "id" || key === "titles_count") {
        return Number(value || 0);
      }

      return String(value || "").toLowerCase();
    }

    function getTotalPages() {
      if (rowsPerPage === "all") {
        return 1;
      }

      return Math.max(1, Math.ceil(filteredCompanies.length / rowsPerPage));
    }

    function getPageItems() {
      if (rowsPerPage === "all") {
        return filteredCompanies;
      }

      const start = (currentPage - 1) * rowsPerPage;
      const end = start + rowsPerPage;

      return filteredCompanies.slice(start, end);
    }

    function applyFiltersAndSort() {
      const query = currentSearch.toLowerCase().trim();

      filteredCompanies = companies.filter(company => {
        return (
          String(company.id).includes(query) ||
          String(company.name || "").toLowerCase().includes(query) ||
          String(company.origin_country || "").toLowerCase().includes(query) ||
          String(company.headquarters || "").toLowerCase().includes(query)
        );
      });

      filteredCompanies.sort((a, b) => {
        const aValue = getSortValue(a, sortKey);
        const bValue = getSortValue(b, sortKey);

        if (aValue < bValue) return sortDirection === "asc" ? -1 : 1;
        if (aValue > bValue) return sortDirection === "asc" ? 1 : -1;
        return Number(a.id || 0) - Number(b.id || 0);
      });

      const totalPages = getTotalPages();

      if (currentPage > totalPages) {
        currentPage = totalPages;
      }

      render(getPageItems());
      updateSortIndicators();
      updatePagination();
    }

    function updateSortIndicators() {
      document.querySelectorAll("th.sortable").forEach(th => {
        const indicator = th.querySelector(".sort-indicator");

        if (th.dataset.sort === sortKey) {
          indicator.textContent = sortDirection === "asc" ? "▲" : "▼";
        } else {
          indicator.textContent = "";
        }
      });
    }

    function updatePagination() {
      const totalPages = getTotalPages();
      const isFirst = currentPage <= 1;
      const isLast = currentPage >= totalPages;

      const pageStatus =
        rowsPerPage === "all"
          ? "Page 1 of 1"
          : `Page ${currentPage.toLocaleString()} of ${totalPages.toLocaleString()}`;

      document.getElementById("page-status").innerText = pageStatus;
      document.getElementById("page-status-bottom").innerText = pageStatus;

      const buttonStates = [
        ["first-page", isFirst],
        ["prev-page", isFirst],
        ["next-page", isLast],
        ["last-page", isLast],
        ["first-page-bottom", isFirst],
        ["prev-page-bottom", isFirst],
        ["next-page-bottom", isLast],
        ["last-page-bottom", isLast]
      ];

      for (const [id, disabled] of buttonStates) {
        document.getElementById(id).disabled = disabled;
      }

      document.getElementById("result-count").innerText =
        `Showing ${filteredCompanies.length.toLocaleString()} of ${companies.length.toLocaleString()} companies`;
    }

    function render(items) {
      const tbody = document.getElementById("results");
      tbody.innerHTML = "";

      for (const company of items) {
        const tr = document.createElement("tr");

        const logoUrl = company.logo_path
          ? `https://image.tmdb.org/t/p/w92${company.logo_path}`
          : "";

        tr.innerHTML = `
          <td class="logo-cell">
            ${
              logoUrl
                ? `<div class="logo-box"><img src="${logoUrl}" alt="${company.name}" class="studio-logo"></div>`
                : `<div class="logo-placeholder"></div>`
            }
          </td>

          <td>${company.id}</td>
          <td>${company.name || ""}</td>
          <td>${Number(company.titles_count || 0).toLocaleString()}</td>
          <td>${company.origin_country || ""}</td>
          <td>${company.headquarters || ""}</td>

          <td>
            <a href="${company.tmdb_url}" target="_blank" rel="noopener">
              Open
            </a>
          </td>
        `;

        tbody.appendChild(tr);
      }
    }

    function goToPage(page) {
      currentPage = Math.min(Math.max(1, page), getTotalPages());
      render(getPageItems());
      updatePagination();

      document.querySelector(".table-wrap").scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    }

    document.getElementById("search").addEventListener("input", event => {
      currentSearch = event.target.value;
      currentPage = 1;
      applyFiltersAndSort();
    });

    document.getElementById("clear-search").addEventListener("click", () => {
      currentSearch = "";
      currentPage = 1;
      document.getElementById("search").value = "";
      applyFiltersAndSort();
      document.getElementById("search").focus();
    });

    document.getElementById("rows-per-page").addEventListener("change", event => {
      rowsPerPage = event.target.value === "all"
        ? "all"
        : Number(event.target.value);

      currentPage = 1;
      applyFiltersAndSort();
    });

    document.getElementById("first-page").addEventListener("click", () => goToPage(1));
    document.getElementById("prev-page").addEventListener("click", () => goToPage(currentPage - 1));
    document.getElementById("next-page").addEventListener("click", () => goToPage(currentPage + 1));
    document.getElementById("last-page").addEventListener("click", () => goToPage(getTotalPages()));

    document.getElementById("first-page-bottom").addEventListener("click", () => goToPage(1));
    document.getElementById("prev-page-bottom").addEventListener("click", () => goToPage(currentPage - 1));
    document.getElementById("next-page-bottom").addEventListener("click", () => goToPage(currentPage + 1));
    document.getElementById("last-page-bottom").addEventListener("click", () => goToPage(getTotalPages()));

    document.querySelectorAll("th.sortable").forEach(th => {
      th.addEventListener("click", () => {
        const selectedSortKey = th.dataset.sort;

        if (sortKey === selectedSortKey) {
          sortDirection = sortDirection === "asc" ? "desc" : "asc";
        } else {
          sortKey = selectedSortKey;
          sortDirection = selectedSortKey === "titles_count" ? "desc" : "asc";
        }

        currentPage = 1;
        applyFiltersAndSort();
      });
    });

    document.getElementById("back-to-top").addEventListener("click", () => {
      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    });

    loadCompanies();
  </script>
</body>
</html>
