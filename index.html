<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TMDB Company Lookup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Inter, system-ui, sans-serif;
      background: #0b0d10;
      color: #f5f5f5;
      margin: 0;
      padding: 32px;
    }

    input {
      width: 100%;
      max-width: 520px;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #151922;
      color: white;
      font-size: 16px;
      margin-bottom: 24px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #222;
      text-align: left;
    }

    a {
      color: #8ab4ff;
    }
   .logo-cell {
  width: 76px;
}

.logo-box {
  width: 64px;
  height: 30px;
  background: #f2f4f7;
  border: 1px solid #d8dde6;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4px;
}

.studio-logo {
  max-height: 22px;
  max-width: 56px;
  object-fit: contain;
  display: block;
}

.logo-placeholder {
  width: 64px;
  height: 30px;
  background: #1b1f27;
  border: 1px solid #2b313b;
  border-radius: 6px;
}
  </style>
</head>
<body>
  <h1>TMDB Company Lookup</h1>
  <p>Search cached TMDB company IDs.</p>
  <p id="stats"></p>
<p id="last-updated"></p>
  <p id="scan-stats"></p>
  <input id="search" placeholder="Search by ID or company name…">
  <p id="result-count"></p>

  <table>
    <thead>
      <tr>
  <th>Logo</th>
  <th>ID</th>
  <th>Company</th>
  <th>Movie Count</th>
  <th>Country</th>
  <th>Headquarters</th>
  <th>TMDB</th>
</tr>
    </thead>
    <tbody id="results"></tbody>
  </table>

  <script>
    let companies = [];

async function loadCompanies() {
  const companiesRes = await fetch("./data/companies.json");
  companies = await companiesRes.json();

  document.getElementById("stats").innerText =
    `${companies.length.toLocaleString()} companies cached`;

  try {
    const metaRes = await fetch("./data/scan-meta.json");

    if (metaRes.ok) {
      const meta = await metaRes.json();
      const lastScan = meta.last_scan;
      const updated = new Date(lastScan.finished_at);

      document.getElementById("last-updated").innerText =
        `Last updated ${updated.toLocaleString()}`;

      document.getElementById("scan-stats").innerText =
  `Last scan: IDs ${lastScan.start_id.toLocaleString()} → ${lastScan.end_id.toLocaleString()} | Checked ${lastScan.checked.toLocaleString()} | Valid ${lastScan.found.toLocaleString()} | IDs with no record: ${lastScan.missing.toLocaleString()}`;
    }
  } catch (error) {
    console.warn("scan-meta.json not available yet");
  }

  render(companies);
}

   function render(items) {
  const tbody = document.getElementById("results");
  tbody.innerHTML = "";
     document.getElementById("result-count").innerText =
  `Showing ${items.length.toLocaleString()} of ${companies.length.toLocaleString()} companies`;

  for (const company of items) {
    const tr = document.createElement("tr");

    const logoUrl = company.logo_path
      ? `https://image.tmdb.org/t/p/w92${company.logo_path}`
      : "";

    tr.innerHTML = `
      <td class="logo-cell">
        ${
logoUrl
  ? `<div class="logo-box"><img src="${logoUrl}" alt="${company.name}" class="studio-logo"></div>`
  : `<div class="logo-placeholder"></div>`
        }
      </td>

      <td>${company.id}</td>

      <td>${company.name}</td>

      <td>${company.titles_count || 0}</td>

      <td>${company.origin_country || ""}</td>

      <td>${company.headquarters || ""}</td>

      <td>
        <a href="${company.tmdb_url}" target="_blank">
          Open
        </a>
      </td>
    `;

    tbody.appendChild(tr);
  }
}

    document.getElementById("search").addEventListener("input", event => {
      const q = event.target.value.toLowerCase().trim();

      const filtered = companies.filter(company =>
        String(company.id).includes(q) ||
        company.name.toLowerCase().includes(q)
      );

      render(filtered);
    });

    loadCompanies();
  </script>
</body>
</html>
